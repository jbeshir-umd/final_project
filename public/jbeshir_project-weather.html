<!DOCTYPE html>
<html lang="en">
<!-- Jemal Beshir Travel Planning App -->

<head>
    
    <meta charset="UTF-8">
    <title>jbeshir Project - Weather</title>
    <link rel="stylesheet" href="jbeshir_project.css">

</head>

<body>

    <header id="bar">Weather</header>

    <nav id="main-nav">

        <ul>
            <li><a href="jbeshir_project-home.html">Home</a></li>
            <li><a href="jbeshir_project-weather.html">Weather</a></li>
            <li><a href="jbeshir_project-currency.html">Currency</a></li>
            <li><a href="jbeshir_project-flights.html">Flights</a></li>
            <li><a href="jbeshir_project-about.html">About</a></li>

        </ul>

    </nav>

    <div class="weather-container">

        <h1>Check the Weather!</h1>

        <div class="lookup-form">

            <input type="text" id="cityInput" placeholder="e.g. London">
            <button class="button-19" onclick="getWeather()">Look Up</button>

        </div>

        <div id="weather-result">
            <h3 id="city-name"></h3>

            <p>Temperature: <strong id="temp"></strong></p>

            
            <p>Condition: <strong id="condition"></strong></p>
            
            <p>Humidity: <strong id="humidity"></strong></p>
            
            <p>Wind Speed: <strong id="wind"></strong></p>
        
        </div>


        <div id="chart-container">
            <canvas id="weatherChart"></canvas>
        </div>


    </div>

    <footer>
        <p>&copy; 2026 Jemal Beshir</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>


    <script>

        var chartInstance = null;



        function getWeather() {

            var city = document.getElementById('cityInput').value.trim();

            if (!city) {

                alert('Please enter a city name.');
                
                return;

            }

            console.log('Getting weather for: ' + city);


            fetch('/api/history', {

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ search_type: 'weather', search_query: city })

            });

            fetch('/api/weather?city=' + encodeURIComponent(city))


                .then(function(res) {
                    return res.json();
                })


                .then(function(json) {

                    console.log(json);

                    if (!json.success) {
                        alert('Error: ' + json.error);
                        return;

                    }

                    var w = json.data.current;
                    var loc = json.data.location;



                    document.getElementById('city-name').innerHTML = loc.name + ', ' + loc.country;

                    document.getElementById('temp').innerHTML = w.temperature + '°C';
                    
                    document.getElementById('condition').innerHTML = w.weather_descriptions[0];

                    document.getElementById('humidity').innerHTML = w.humidity + '%';

                    document.getElementById('wind').innerHTML = w.wind_speed + ' km/h';

                    document.getElementById('weather-result').style.display = 'block';

                    anime({
                        targets: '#weather-result',
                        opacity: [0, 1],
                        translateY: [-10, 0],
                        duration: 600,
                        easing: 'easeOutQuad'
                    });


                    showChart(w);

                });

        }

        function showChart(w) {

            document.getElementById('chart-container').style.display = 'block';


            if (chartInstance) {
                chartInstance.destroy();
            }



            var ctx = document.getElementById('weatherChart');

            chartInstance = new Chart(ctx, {

                type: 'bar',
                data: {
                    labels: ['Temp (C)', 'Feels Like', 'Humidity (%)', 'Wind (km/h)'],
                    datasets: [{
                        label: 'Weather Info',
                        data: [w.temperature, w.feelslike, w.humidity, w.wind_speed],
                        backgroundColor: ['royalblue', 'steelblue', 'cornflowerblue', 'cadetblue'],
                        borderWidth: 1
                    }]

                },


                options: {

                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }

            });


        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                getWeather();
            }
        });
        

    </script>

</body>
</html>
