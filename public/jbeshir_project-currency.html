<!DOCTYPE html>
<html lang="en">
<!-- Jemal Beshir Travel Planning App -->

<head>
    <meta charset="UTF-8">
    <title>jbeshir Project - Currency</title>
    <link rel="stylesheet" href="jbeshir_project.css">

</head>

<body>

    
    <header id="bar">Currency Converter</header>

    <nav id="main-nav">
        <ul>


            <li><a href="jbeshir_project-home.html">Home</a></li>
            <li><a href="jbeshir_project-weather.html">Weather</a></li>
            <li><a href="jbeshir_project-currency.html">Currency</a></li>
            <li><a href="jbeshir_project-flights.html">Flights</a></li>
            <li><a href="jbeshir_project-about.html">About</a></li>

        </ul>


    </nav>

    <div class="currency-container">

        <h1>Convert Currency</h1>

        <div class="lookup-form">
            
            <input type="number" id="amountInput" placeholder="Amount" value="100">
            <select id="fromSelect"></select>
            <select id="toSelect"></select>
            <button class="button-19" onclick="convertCurrency()">Convert</button>
        
        </div>


        <div id="currency-result">


            <p id="result-text"></p>
            <p id="rate-text"></p>

        </div>



    </div>


    <footer>
        <p>&copy; 2026 Jemal Beshir</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>

        var ratesData = null;

        function loadRates() {

            console.log('Loading exchange rates');

            fetch('/api/currency')
                .then(function(res) {
                    return res.json();
                })

                .then(function(json) {
                    console.log(json);

                    if (!json.success) {
                        alert('Could not load rates.');
                        return;
                    }

                    ratesData = json.data.rates;

                    var currencies = Object.keys(ratesData).sort();

                    var fromSel = document.getElementById('fromSelect');

                    var toSel = document.getElementById('toSelect');


                    currencies.forEach(function(c) {
                        var opt1 = document.createElement('option');
                        opt1.value = c;
                        opt1.innerHTML = c;
                        fromSel.appendChild(opt1);

                        var opt2 = document.createElement('option');
                        opt2.value = c;

                        opt2.innerHTML = c;

                        toSel.appendChild(opt2);

                    });

                    fromSel.value = 'USD';
                    toSel.value = 'EUR';

                });


        }

        function convertCurrency() {

            if (!ratesData) {
                alert('Rates not loaded yet, try again.');
                return;
            }




            var amount = parseFloat(document.getElementById('amountInput').value);


            var from = document.getElementById('fromSelect').value;

            var to = document.getElementById('toSelect').value;



            if (!amount || amount <= 0) {

                alert('Enter a valid amount.');
                
                return;

            }


            console.log('Converting ' + amount + ' ' + from + ' to ' + to);

            fetch('/api/history', {

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ search_type: 'currency', search_query: from + ' to ' + to })
            
            });


            var amountInUSD = amount / ratesData[from];

            var converted = amountInUSD * ratesData[to];
            
            var rate = ratesData[to] / ratesData[from];


            document.getElementById('result-text').innerHTML =
                amount + ' ' + from + ' = ' + converted.toFixed(2) + ' ' + to;

            document.getElementById('rate-text').innerHTML =
                '1 ' + from + ' = ' + rate.toFixed(4) + ' ' + to;

            document.getElementById('currency-result').style.display = 'block';

        }


        window.onload = function() {

            loadRates();

        }

    </script>

</body>

</html>
